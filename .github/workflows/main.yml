# .github/workflows/main.yml

name: 'Build & Release Plugin'

on:
  workflow_dispatch:

  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/*'

jobs:
  build:
    runs-on: windows-latest
    
    permissions:
      contents: write

    env:
      python_ver: 3.11

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ env.python_ver }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.python_ver }}

    - name: Get plugin version from plugin.json
      id: version
      uses: notiz-dev/github-action-json-property@release
      with:
        path: 'plugin.json'
        prop_path: 'Version'

    - name: Install dependencies into lib folder
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        if (Test-Path .\lib) {
          Remove-Item .\lib -Recurse -Force
        }
        # Install Windows runtime dependencies into the ./lib directory
        pip install flox-lib vdf urllib3 certifi pillow==12.1.0 -t .\lib

    - name: Create release zip
      shell: pwsh
      run: |
        $staging = Join-Path $PWD '.release'
        if (Test-Path $staging) {
          Remove-Item $staging -Recurse -Force
        }
        New-Item -ItemType Directory -Path $staging | Out-Null
        Get-ChildItem -Force | Where-Object { $_.Name -notin '.git', '.github', '.release' } | ForEach-Object {
          Copy-Item -LiteralPath $_.FullName -Destination $staging -Recurse -Force
        }
        $zipPath = Join-Path $PWD 'Flow.Launcher.Plugin.SteamFlow.zip'
        if (Test-Path $zipPath) {
          Remove-Item $zipPath -Force
        }
        Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $zipPath

    - name: Publish Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        # The zip file to upload
        files: 'Flow.Launcher.Plugin.SteamFlow.zip'
        # The release will be tagged with "v" + the version from plugin.json (e.g., v1.0.0)
        tag_name: "v${{steps.version.outputs.prop}}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
