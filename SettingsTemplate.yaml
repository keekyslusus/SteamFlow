body:
  - type: dropdown
    attributes:
      name: language
      label: "Language"
      description: "Plugin display language"
      defaultValue: "Auto (system language)"
      options:
        - "Auto (system language)"
        - "English"
        - "German"
        - "Spanish - Spain"
        - "French"
        - "Japanese"
        - "Korean"
        - "Polish"
        - "Portuguese - Brazil"
        - "Russian"
        - "Simplified Chinese"
        - "Traditional Chinese"
  - type: input
    attributes:
      name: blacklisted_app_ids
      label: "Blacklisted App IDs"
      description: "Comma-separated Steam App IDs hidden from local and store results\n228980 - Steamworks Common Redistributables"
      defaultValue: "228980"
  - type: checkbox
    attributes:
      name: show_platforms
      label: "Show available platforms"
      description: "Show Win/Mac/Linux in Steam store results"
      defaultValue: false
  - type: checkbox
    attributes:
      name: show_player_count
      label: "Show player count"
      description: "Show current players when Steam provides the data"
      defaultValue: true
  - type: checkbox
    attributes:
      name: show_positive_reviews
      label: "Show positive reviews"
      description: "Show the positive review percentage and rating summary from Steam"
      defaultValue: true
  - type: checkbox
    attributes:
      name: show_playtime
      label: "Show playtime"
      description: "Show total playtime for installed games from localconfig.vdf"
      defaultValue: true
  - type: checkbox
    attributes:
      name: show_last_played
      label: "Show last played"
      description: "Show the last played date for installed games from localconfig.vdf"
      defaultValue: true
  - type: checkbox
    attributes:
      name: show_achievements
      label: "Show achievements"
      description: "Show local achievement progress for installed games from Steam's appcache stats"
      defaultValue: true
  - type: checkbox
    attributes:
      name: show_prices
      label: "Show prices"
      description: "Show regional prices in Steam store results"
      defaultValue: true
  - type: checkbox
    attributes:
      name: sort_local_by_recent
      label: "Sort local by recent"
      description: "For empty search, show recently launched local games first"
      defaultValue: true
  - type: checkbox
    attributes:
      name: hide_hidden_games
      label: "Hide Steam hidden collection games"
      description: "Filter games from Steam's Hidden collection in local and store results"
      defaultValue: true
  - type: checkbox
    attributes:
      name: show_steamdb_context_menu
      label: "Show SteamDB in context menu"
      description: "Show SteamDB links in game context menus"
      defaultValue: true
  - type: checkbox
    attributes:
      name: show_csrin_context_menu
      label: "Show CS.RIN in context menu"
      description: "Show CS.RIN search links in installed game context menus"
      defaultValue: true
  - type: checkbox
    attributes:
      name: enable_perf_logging
      label: "[debug] Enable performance logging"
      description: "Log slow query stages and network calls to plugin.log"
      defaultValue: false
